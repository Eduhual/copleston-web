<!DOCTYPE html>
<html lang="es">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<body style="display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; text-align: center; overflow: hidden; position: relative;">
    <!-- Preloader Institucional -->
    <div id="copleston-preloader">
        <img src="./IMG/logo/logo.png" alt="Copleston Shield" class="preloader-logo">
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <div class="custom-cursor-follower"></div>


    <!-- Efecto de viñeta inmersivo oscuro de fondo -->
    <div class="hero-vignette" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;"></div>
    <!-- Brillo dorado sutil en el fondo -->
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(197, 160, 89, 0.05) 0%, transparent 70%); z-index: 1;"></div>

    <main class="content-wrapper" style="position: relative; z-index: 2; max-width: 800px; padding: 2rem;">
        
        <a href="./index.html" style="text-decoration: none; display: inline-block; margin-bottom: 2.5rem; opacity: 0.85; transition: opacity 0.3s ease;">
            <img src="./IMG/logo/logo.png" alt="Escudo Copleston" style="width: 130px; margin-bottom: 1.2rem; filter: drop-shadow(0 0 15px rgba(197,160,89,0.2));">
            <span class="logo-text" style="display: block; font-size: 1.3rem;">Instituto Copleston</span>
        </a>

        <!-- Mensaje de Error Premium -->
        <span class="golden-label" style="font-size: 0.9rem; letter-spacing: 5px; margin-bottom: 1.5rem; display: block; color: var(--gold);">ERROR 404</span>
        
        <h1 class="article-main-title" style="font-size: 4rem; margin-bottom: 1.5rem; line-height: 1.1; text-shadow: 0 4px 30px rgba(0,0,0,0.8);">Página Inexistente</h1>
        
        <div class="gold-divider-center" style="margin-top: 2rem; margin-bottom: 2.5rem; width: 80px; opacity: 0.7;"></div>
        
        <p class="elegant-text" style="font-size: 1.3rem; font-weight: 300; line-height: 1.8; margin-bottom: 4rem; max-width: 650px; margin-left: auto; margin-right: auto; color: #a1abc1;">
            La información que buscas ya no se encuentra en este directorio.
        </p>
        
        <a href="./index.html" class="btn-gold-solid" style="letter-spacing: 3px; font-size: 0.95rem; padding: 1.3rem 4rem;">Regresar al Menú Principal</a>
    </main>

    <!-- Back to Top Button -->
    <button id="back-to-top" aria-label="Volver arriba">&#8593;</button>
    
    <!-- Scripts (Vital for Preloader & Animations) -->
    <script src="./script.js"></script>

</html>
